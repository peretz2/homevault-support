<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeVault</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 24px; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .subtitle { color: #8e8e93; font-size: 1rem; margin-bottom: 40px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .links a { display: block; padding: 16px 20px; background: #1c1c1e; border-radius: 12px; color: #fff; text-decoration: none; font-size: 1rem; transition: background 0.2s; }
        .links a:hover { background: #2c2c2e; }
        .links a span { color: #8e8e93; font-size: 0.85rem; display: block; margin-top: 4px; }
        .contact-block { margin-top: 32px; padding: 20px; background: #1c1c1e; border-radius: 12px; text-align: center; }
        .contact-block h2 { font-size: 1rem; color: #fff; margin-bottom: 8px; font-weight: 600; }
        .contact-block a { color: #007AFF; text-decoration: none; font-size: 1rem; display: inline-block; margin: 4px 0; }
        .contact-block .response-time { color: #8e8e93; font-size: 0.8rem; margin-top: 6px; }
        .footer { margin-top: 60px; color: #48484a; font-size: 0.8rem; text-align: center; }
        .logo { font-size: 3rem; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠🔒</div>
        <h1>HomeVault</h1>
        <p class="subtitle">ניהול בית חכם לזוגות</p>
        <div class="links">
            <a href="privacy.html">מדיניות פרטיות<span>Privacy Policy</span></a>
            <a href="terms.html">תנאי שימוש<span>Terms of Use</span></a>
            <a href="support.html">תמיכה<span>Support</span></a>
        </div>
        <div class="contact-block">
            <h2>📧 צור קשר</h2>
            <a href="mailto:jaccoperetz@gmail.com">jaccoperetz@gmail.com</a>
            <p class="response-time">זמן מענה: עד 48 שעות</p>
        </div>
        <p class="footer">© 2026 Jack Perez. All rights reserved.</p>
    </div>
</body>
</html>
